<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bielisko Mod Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script> <!-- Icons -->
</head>
<body>
    <!-- Background animations -->
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <div id="loader" class="glass-panel centered">
        <div class="spinner"></div>
        <p>Autoryzacja w toku...</p>
    </div>

    <div id="app" style="display: none;">
        <!-- Header / Nav -->
        <header class="glass-header">
            <div class="header-logo">
                <span class="logo-icon">🛡️</span> Bielisko<span class="highlight">Panel</span>
            </div>
            
            <div class="header-actions">
                <div class="shift-status" id="shiftStatusBadge">
                    <div class="status-dot"></div> <span id="shiftStatusText">Brak służby</span>
                </div>
                <button id="btnToggleShift" class="btn btn-outline">Zacznij Służbę</button>
            </div>

            <div class="user-profile">
                <img id="userAvatar" src="" alt="Avatar" class="avatar default-avatar">
                <div class="user-info">
                    <span id="userName" class="username">...</span>
                    <span class="role">Moderator</span>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left Sidebar: Moderation Logs with Tabs -->
            <aside class="left-sidebar">
                <div class="glass-panel sticky-card log-card">
                    <div class="card-tabs">
                        <button class="tab-btn active" id="tabModMe" onclick="switchModTab('me')">Moje Akcje</button>
                        <button class="tab-btn" id="tabModAll" onclick="switchModTab('all')">Wszystkie</button>
                    </div>
                    <div id="modLogsList" class="log-list">
                        <p class="empty-state">Ładowanie logów...</p>
                    </div>
                </div>
            </aside>

            <!-- Center Content Area: Players List & Quick Actions -->
            <section class="main-content">
                <div class="glass-panel quick-actions-row">
                    <h3>Szybkie akcje</h3>
                    <div class="action-buttons">
                        <button class="btn btn-log" onclick="openLogModal()">📝 Log Raport</button>
                        <div class="mini-stat">
                            <span class="stat-label">Online:</span>
                            <span class="stat-value" id="statsPlayers">0</span>
                        </div>
                    </div>
                </div>

                <div class="glass-panel players-panel">
                    <div class="panel-header">
                        <h2>Gracze online (ER:LC)</h2>
                        <div class="panel-controls">
                            <button id="btnRefresh" class="btn-icon" title="Odśwież">🔄</button>
                        </div>
                    </div>

                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Szukaj gracza...">
                    </div>

                    <div class="table-container">
                        <table id="playersTable">
                            <thead>
                                <tr>
                                    <th>Gracz (Roblox)</th>
                                    <th>Permisje</th>
                                    <th class="actions-col">Opcje</th>
                                </tr>
                            </thead>
                            <tbody id="playersList"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Right Sidebar: Server Logs & Duty Status -->
            <aside class="right-sidebar">
                <div class="glass-panel sticky-card log-card">
                    <h3>🛡️ Na służbie</h3>
                    <div id="activeModeratorsList" class="mods-list"></div>
                    
                    <div class="divider"></div>
                    
                    <div class="server-logs">
                        <div class="log-section">
                            <h4>⚔️ Kill Log</h4>
                            <div id="killLogsList" class="log-list small"></div>
                        </div>
                        <div class="log-section">
                            <h4>⌨️ Command Log</h4>
                            <div id="commandLogsList" class="log-list small"></div>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- action Modal -->
    <div id="actionModal" class="modal-overlay" style="display:none;">
        <div class="modal glass-panel">
            <h2 id="modalTitle">Wykonaj akcję na <span id="modalTargetNick" class="highlight">...</span></h2>
            <form id="actionForm">
                <input type="hidden" id="modalTarget">
                <input type="hidden" id="modalType">
                
                <div class="form-group" id="durationGroup" style="display:none;">
                    <label>Czas trwania (np. 1h, 24h, zostaw puste dla perm) <span class="required">*</span></label>
                    <input type="text" id="actionDuration" placeholder="24h" class="input-dark">
                </div>

                <div class="form-group">
                    <label>Powód <span class="required">*</span></label>
                    <textarea id="actionReason" rows="3" placeholder="Wpisz dokładny powód akcji..." required class="input-dark"></textarea>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Anuluj</button>
                    <button type="submit" class="btn btn-danger" id="btnConfirmAction">Potwierdź Akcję</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
