version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bieliskobot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: bieliskobot
    volumes:
      - bot-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bieliskobot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: bieliskobot-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:secretpassword@db:5432/bieliskobot?schema=public
      - PORT=3000
    ports:
      - "3000:3000"
    volumes:
      - bot-uploads:/app/uploads

volumes:
  bot-db-data:
  bot-uploads:
